stages:
  - repo_inventory
  - current_state_audit
  - baseline_app_shell
  - market_gap_analysis
  - first_principles
  - flywheel_designer
  - convergence_contract
  - product_definition
  - monetization_architect
  - feedback_agent
  - grand_wizard
  - builder
  - independent_qa
  - release_agent
  - growth_operator
  - investor_panel

# Re-run from `grand_wizard` through `investor_panel` until every archetype grade is A- or better,
# or `max_rounds` is exhausted (then `investor_panel` fails the pipeline). Restarting from
# `grand_wizard` re-consolidates investor directives into a concrete BUILD_SPEC before builder/Cursor.
# The persistent `.foundry/product-ledger.json` preserves parked features across rounds.
investor_refinement:
  restart_from: grand_wizard
  max_rounds: 3
